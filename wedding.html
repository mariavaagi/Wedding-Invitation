<!DOCTYPE html>
<html lang="hy">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Արման & Մարիամ</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display&family=Montserrat&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    font-family: 'Montserrat', sans-serif;
    background: #f9f7f5;
    color: #333;
    text-align: center;
}

.container {
    padding: 40px 20px;
}

h1 {
    font-family: 'Playfair Display', serif;
    font-size: 48px;
    margin-bottom: 10px;
}

h2 {
    font-weight: 300;
    color: #777;
}

.section {
    margin-top: 40px;
}

.card {
    background: white;
    max-width: 500px;
    margin: 20px auto;
    padding: 25px;
    border-radius: 16px;
    box-shadow: 0 6px 20px rgba(0,0,0,0.08);
}

.heart {
    font-size: 24px;
    color: #c9a27e;
}

.date {
    font-size: 20px;
    margin-top: 10px;
    color: #555;
}

/* gallery */
.gallery {
    display: flex;
    overflow-x: auto;
    gap: 10px;
    padding: 10px;
}

.gallery img {
    height: 200px;
    border-radius: 12px;
}

/* button */
.btn {
    display: inline-block;
    margin-top: 10px;
    padding: 10px 18px;
    border-radius: 25px;
    background: #c9a27e;
    color: white;
    text-decoration: none;
    font-size: 14px;
}

</style>
</head>

<body>

<div class="container">

    <h2>Սիրով հրավիրում ենք</h2>
    <h1>Արման <span class="heart">♥</span> Մարիամ</h1>

    <p>մեր հարսանիքին</p>

    <div class="date">Հունիսի 28, 2026</div>

    <div class="section card">
        <h2>💍 Պսակադրություն</h2>
        <p><strong>Ժամ՝</strong> 15:00</p>
        <p><strong>Վայր՝</strong> LIGA GARDEN, Զովունի</p>

        <a class="btn" href="https://maps.google.com/?q=LIGA+GARDEN+Zovuni" target="_blank">
            Բացել քարտեզում
        </a>
    </div>

    <div class="section card">
        <h2>🎉 Խնջույք</h2>
        <p><strong>Ժամ՝</strong> 17:30</p>
        <p><strong>Վայր՝</strong> MORENA WHITE</p>

        <a class="btn" href="https://maps.google.com/?q=MORENA+WHITE" target="_blank">
            Բացել քարտեզում
        </a>
    </div>

    <div class="section">
        <h2>📸 Մեր հիշողությունները</h2>

        <div class="gallery">
            <img src="photo1.jpg">
            <img src="photo2.jpg">
            <img src="photo3.jpg">
        </div>
    </div>

    <div class="section">
        <p>Սիրով սպասում ենք Ձեզ 🤍</p>
    </div>

</div>

</body>
</html>
